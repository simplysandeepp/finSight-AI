services:
  - type: web
    name: finsight-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt && python train_pipeline.py"
    startCommand: "cd backend && uvicorn orchestrator.api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
